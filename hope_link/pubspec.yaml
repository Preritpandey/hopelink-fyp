name: hope_link
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  google_fonts: ^6.3.1
  cached_network_image: ^3.4.1
  file_picker: ^8.0.0
  intl: ^0.19.0
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  sizer: ^3.1.3
  get: ^4.6.6
  http: ^1.2.1
  http_parser: ^4.0.2
  get_storage: ^2.1.1
  pin_code_fields: ^8.0.1
  image_picker: ^1.0.7
  dio: ^5.4.0
  flutter_map: ^7.0.2
  path_provider: ^2.1.1
  latlong2: ^0.9.1
  mime: ^1.0.4
  fluttertoast: ^8.2.2
  open_filex: 
  url_launcher: ^6.3.2
  shimmer:
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_stripe: ^10.1.1
  khalti_checkout_flutter: ^1.0.0-dev.9

dev_dependencies:
  build_runner: 
  flutter_gen_runner: 
  freezed: 
  json_serializable: 
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:


  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#F6F0E6"
  adaptive_icon_foreground: "assets/icons/app icon.png"

flutter_native_splash:
  color: "#F6F0E6"
  image: "assets/icons/splash icon.png"
  android_12:
    color: "#F6F0E6"
    image: "assets/icons/splash icon.png"
  ios: true
  android: true
  web: false

